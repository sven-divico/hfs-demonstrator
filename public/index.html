<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HFS Demo — Workspace</title>
  <link rel="stylesheet" href="/app.css">
  <script type="module" src="/components/tab-strip.js"></script>
  <script type="module" src="/components/wo-status-matrix.js"></script>
  <script type="module" src="/components/wo-detail-tab.js"></script>
  <script type="module" src="/components/task-detail-tab.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">DG</div>
    <nav><span>All</span><span>Favorites</span><span>History</span><span>Workspaces</span></nav>
    <div class="workspace-pill">HFS Demo Workspace ★</div>
  </header>
  <div class="action-bar" role="toolbar" aria-label="Workspace actions">
    <!-- Action buttons land here in the next phase -->
    <span class="action-bar-hint">Last refreshed just now</span>
    <span class="action-bar-spacer"></span>
  </div>
  <tab-strip>
    <button slot="tab" data-tab-id="matrix" data-tab-type="list" class="active">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      <span class="tab-label">Legacy Orders</span>
    </button>
  </tab-strip>
  <main class="workspace">
    <aside class="sidebar">
      <div class="sidebar-section-title">My Lists</div>
      <button class="list-item active" data-list="legacy">Legacy Orders</button>
      <button class="list-item" data-list="attention">Needs Attention</button>
    </aside>
    <section class="content">
      <wo-status-matrix id="matrix-view" data-endpoint="/api/work-orders/matrix" data-list="legacy" data-tab-pane="matrix"></wo-status-matrix>
    </section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
